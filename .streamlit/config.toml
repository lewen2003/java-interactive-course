[theme]
primaryColor = "#0ea5e9"
backgroundColor = "#0f172a"
secondaryBackgroundColor = "#1e293b"
textColor = "#e2e8f0"
font = "sans serif"

[client]
showErrorDetails = true
toolbarMode = "minimal"

[server]
headless = true
enableCORS = false
port = 8501
maxUploadSize = 200

[logger]
level = "info"
